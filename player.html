<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandela Effect — Play!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0c10;--bg-raised:#12131a;--bg-card:#161822;
  --bg-glass:rgba(22,24,34,0.8);
  --red:#EF4444;--red-glow:rgba(239,68,68,0.3);
  --blue:#3B82F6;--blue-glow:rgba(59,130,246,0.25);
  --green:#22C55E;--green-glow:rgba(34,197,94,0.25);
  --gold:#F59E0B;--gold-glow:rgba(245,158,11,0.25);
  --txt:#E2E8F0;--dim:#64748B;--border:rgba(255,255,255,0.08);
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--glass-blur:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:var(--font);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

/* ═══ JOIN ═══ */
#join{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;padding:20px;width:100%;max-width:440px;position:relative;}
#join-canvas{position:fixed;inset:0;width:100%;height:100%;opacity:0.12;pointer-events:none;z-index:0;}
#join>*{position:relative;z-index:1;}
.join-eyebrow{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:3px;color:var(--red);border:1px solid rgba(239,68,68,0.3);border-radius:20px;padding:5px 14px;animation:eyePulse 2s ease-in-out infinite;}
@keyframes eyePulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0);}50%{box-shadow:0 0 16px rgba(239,68,68,0.2);}}
.join-title{font-size:clamp(30px,8vw,46px);font-weight:700;letter-spacing:2px;text-align:center;position:relative;display:inline-block;}
.join-title::before,.join-title::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;height:100%;font-size:inherit;font-weight:inherit;letter-spacing:inherit;font-family:inherit;}
.join-title::before{color:var(--red);animation:g1 2s infinite steps(1);clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);}
.join-title::after{color:var(--blue);animation:g2 2s infinite steps(1);clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%);}
@keyframes g1{0%,88%{transform:none;opacity:0;}89%{transform:translate(-3px,0);opacity:1;}91%{transform:translate(3px,0);opacity:1;}93%{transform:translate(-2px,0);opacity:1;}95%,100%{transform:none;opacity:0;}}
@keyframes g2{0%,90%{transform:none;opacity:0;}91%{transform:translate(4px,0);opacity:1;}93%{transform:translate(-4px,0);opacity:1;}95%{transform:translate(2px,0);opacity:1;}97%,100%{transform:none;opacity:0;}}
.join-subtitle{font-family:var(--mono);font-size:clamp(10px,2.5vw,14px);font-weight:700;letter-spacing:8px;color:var(--gold);}
.join-sub{font-size:13px;color:var(--dim);text-align:center;}
#name-input{width:100%;padding:14px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);color:#fff;font-family:var(--font);font-size:16px;font-weight:600;outline:none;text-align:center;transition:border-color .2s,box-shadow .2s;}
#name-input:focus{border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);}
#name-input::placeholder{color:var(--dim);}
.join-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#DC2626,var(--red));color:#fff;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;position:relative;overflow:hidden;transition:all .15s;box-shadow:0 0 20px var(--red-glow);}
.join-btn:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(239,68,68,0.4);}
.join-btn:active{transform:scale(.98);}
.join-btn::after{content:'';position:absolute;left:-100%;top:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);animation:scan 2.5s infinite;}
@keyframes scan{0%{left:-100%}100%{left:200%}}
#join-error{color:var(--red);font-family:var(--mono);font-size:11px;min-height:14px;text-align:center;}
#join-list{font-size:11px;color:var(--dim);text-align:center;line-height:1.6;max-width:340px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;width:100%;min-height:36px;}
#join-list b{color:var(--green);}

/* ═══ WAITING ═══ */
#waiting{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;padding:20px;
  background:radial-gradient(ellipse at 30% 30%,rgba(59,130,246,0.05) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(239,68,68,0.04) 0%,transparent 60%),var(--bg);}
.wait-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#6366F1);border:3px solid rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;box-shadow:0 0 30px var(--blue-glow);animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.wait-name{font-size:22px;font-weight:700;}
.wait-ready{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:3px;color:var(--green);border:1px solid rgba(34,197,94,0.3);border-radius:20px;padding:5px 16px;}
.wait-msg{font-size:14px;color:var(--dim);text-align:center;}
.wait-dots{display:flex;gap:6px;}
.wait-dots span{width:8px;height:8px;border-radius:50%;background:var(--dim);animation:bounce 1.4s ease-in-out infinite;}
.wait-dots span:nth-child(2){animation-delay:.2s;}
.wait-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(1);opacity:.4;}40%{transform:scale(1.4);opacity:1;}}
.wait-score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:8px;}
.wait-score-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);}
.wait-score{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--gold);}

/* ═══ GAME ═══ */
#game{display:none;flex-direction:column;align-items:center;width:100%;max-width:500px;padding:14px 16px;gap:10px;min-height:100vh;min-height:100dvh;position:relative;
  background:radial-gradient(ellipse at 50% 0%,rgba(239,68,68,0.04) 0%,transparent 50%),var(--bg);}
.game-top{width:100%;display:flex;align-items:center;justify-content:space-between;}
.game-badge{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--red);letter-spacing:1.5px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:16px;padding:4px 12px;}
.game-score-pill{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gold);background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:16px;padding:4px 12px;transition:all .3s;}
.game-brand{font-size:clamp(20px,5vw,30px);font-weight:700;letter-spacing:2px;text-align:center;}
.game-logo{max-height:120px;max-width:260px;width:auto;object-fit:contain;background:#fff;padding:12px 24px;border-radius:var(--radius);box-shadow:0 0 0 1px var(--border),0 6px 20px rgba(0,0,0,0.4);}
.game-question{font-size:clamp(14px,3.5vw,17px);font-weight:600;color:var(--txt);text-align:center;line-height:1.5;padding:12px 16px;background:var(--bg-glass);backdrop-filter:blur(var(--glass-blur));border:1px solid var(--border);border-radius:var(--radius);width:100%;}
.options{display:flex;flex-direction:column;gap:8px;width:100%;}
.opt-btn{width:100%;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);color:var(--txt);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.opt-btn:hover:not(:disabled){border-color:var(--blue);background:rgba(59,130,246,0.08);transform:scale(1.01);}
.opt-btn:active:not(:disabled){transform:scale(.98);}
.opt-btn.selected{border-color:var(--blue);background:rgba(59,130,246,0.15);color:#fff;box-shadow:0 0 12px var(--blue-glow);}
.opt-btn.correct{border-color:var(--green)!important;background:rgba(34,197,94,0.15)!important;color:var(--green)!important;box-shadow:0 0 14px var(--green-glow)!important;}
.opt-btn.wrong{border-color:var(--red)!important;background:rgba(239,68,68,0.1)!important;color:var(--red)!important;opacity:.7;}
.opt-btn:disabled{cursor:default;}
.timer-bar-wrap{width:100%;height:5px;background:var(--bg-card);border-radius:3px;overflow:hidden;}
.timer-bar{height:100%;background:var(--green);border-radius:3px;transition:width .3s linear,background .3s;}
.timer-bar.low{background:var(--red);}
.feedback{font-family:var(--mono);font-size:14px;font-weight:700;min-height:22px;text-align:center;letter-spacing:.5px;transition:all .3s;}
.feedback.correct{color:var(--green);}
.feedback.bonus{color:var(--gold);text-shadow:0 0 10px var(--gold-glow);}
.feedback.wrong{color:var(--red);}
.feedback.timeout{color:var(--dim);}

/* ═══ CELEBRATION EFFECTS ═══ */
@keyframes scoreBurst{
  0%{transform:scale(1);color:var(--gold);}
  30%{transform:scale(1.8);color:#FCD34D;text-shadow:0 0 20px var(--gold);}
  100%{transform:scale(1);color:var(--gold);text-shadow:none;}
}
@keyframes screenFlash{
  0%{opacity:0;}
  20%{opacity:1;}
  100%{opacity:0;}
}
#flash-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:999;
  background:radial-gradient(circle at center,rgba(34,197,94,0.15),transparent 70%);
  opacity:0;
}
#flash-overlay.flash{animation:screenFlash .5s ease-out;}
.sparkle-player{
  position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:1000;
  animation:sparkFly .6s ease-out both;
}
@keyframes sparkFly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0;}
}

/* ═══ MINI LEADERBOARD ═══ */
#mini-lb{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.mlb-hdr{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gold);padding:6px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.mlb-list{display:flex;flex-direction:column;}
.mlb-row{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;transition:background .2s;}
.mlb-row:last-child{border-bottom:none;}
.mlb-row.me{background:rgba(59,130,246,0.08);border-left:2px solid var(--blue);}
.mlb-row.top1{background:rgba(245,158,11,0.06);}
.mlb-rank{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:20px;text-align:center;}
.mlb-name{flex:1;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mlb-pts{font-family:var(--mono);font-weight:700;color:#fff;min-width:24px;text-align:right;}
.mlb-sep{padding:4px 12px;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;text-align:center;}

/* ═══ RESULT ═══ */
#result{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:16px;padding:20px;
  background:radial-gradient(ellipse at 50% 40%,rgba(245,158,11,0.06) 0%,transparent 50%),var(--bg);}
.result-icon{font-size:64px;animation:float 3s ease-in-out infinite;}
.result-title{font-size:24px;font-weight:700;text-align:center;}
.result-title span{color:var(--gold);}
.result-score{font-family:var(--mono);font-size:52px;font-weight:700;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);}
.result-sub{font-size:13px;color:var(--dim);}
.result-rank{font-family:var(--mono);font-size:14px;color:var(--txt);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 24px;}
</style>
</head>
<body>
<div id="join">
  <canvas id="join-canvas"></canvas>
  <div class="join-eyebrow">⚠ LOGOS MAY NOT BE WHAT THEY SEEM</div>
  <div class="join-title" data-text="MANDELA EFFECT">MANDELA EFFECT</div>
  <div class="join-subtitle">LOGO QUIZ</div>
  <div class="join-sub">Enter your name to join</div>
  <input type="text" id="name-input" placeholder="Your name..." maxlength="20" autocomplete="off">
  <button class="join-btn" id="join-btn" onclick="joinGame()">JOIN GAME ▶</button>
  <div id="join-error"></div>
  <div id="join-list">Waiting for players...</div>
</div>
<div id="waiting">
  <div class="wait-avatar" id="wait-avatar">??</div>
  <div class="wait-name" id="wait-name">Player</div>
  <div class="wait-ready">✓ CONNECTED</div>
  <div class="wait-msg">Waiting for the host to start</div>
  <div class="wait-dots"><span></span><span></span><span></span></div>
  <div class="wait-score-wrap"><div class="wait-score-label">YOUR SCORE</div><div class="wait-score" id="wait-score">0</div></div>
</div>
<div id="game">
  <div id="flash-overlay"></div>
  <div class="game-top"><div class="game-badge" id="game-badge">LOGO 1/15</div><div class="game-score-pill" id="game-score">0 pts</div></div>
  <div class="game-brand" id="game-brand">Brand</div>
  <img class="game-logo" id="game-logo" src="" alt="logo">
  <div class="game-question" id="game-question">Question</div>
  <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div id="mini-lb"><div class="mlb-hdr"><span>🏆 RANKING</span><span id="mlb-count"></span></div><div class="mlb-list" id="mlb-list"></div></div>
</div>
<div id="result">
  <div class="result-icon">🏆</div>
  <div class="result-title">Quiz <span>Complete!</span></div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-sub">points</div>
  <div class="result-rank" id="result-rank"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBL-Ohfp8AG7d5TNupSiXxW7Lu_PQt3410",
  authDomain:"mandela-effect-ice-breaker.firebaseapp.com",
  databaseURL:"https://mandela-effect-ice-breaker-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mandela-effect-ice-breaker",
  storageBucket:"mandela-effect-ice-breaker.firebasestorage.app",
  messagingSenderId:"34581284808",
  appId:"1:34581284808:web:b56286b3864afd04a122fd"
});
const db=firebase.database();

const QS=[
  {brand:"Volkswagen",q:"Do the 'V' and 'W' touch or are they separated?",opts:["Touch","Separated"],correct:1},
  {brand:"Starbucks",q:"How many tails does the siren have?",opts:["No tails","One tail","Two tails"],correct:2},
  {brand:"Pringles",q:"Does the mascot wear a monocle?",opts:["Yes, monocle","No monocle"],correct:1},
  {brand:"Booking",q:"What colour is the dot in Booking.com?",opts:["Baby blue","Black","Dark navy"],correct:0},
  {brand:"Twitter",q:"Which direction does the bird face?",opts:["Left","Right"],correct:1},
  {brand:"IKEA",q:"What colour are the IKEA letters?",opts:["Blue","Yellow"],correct:0},
  {brand:"Hermès",q:"Which direction does the horse face?",opts:["Left","Right"],correct:1},
  {brand:"Pepsi",q:"What colour is at the TOP of the circle?",opts:["Red on top","Blue on top"],correct:0},
  {brand:"Amazon",q:"Where does the yellow arrow go?",opts:["A to Z","A to M","A to O"],correct:0},
  {brand:"Monopoly",q:"Does the Monopoly man wear a monocle?",opts:["Yes, monocle","No monocle"],correct:1},
  {brand:"McDonald's",q:"Do the golden arches have a red outline?",opts:["Yes, outline","No outline"],correct:1},
  {brand:"Lacoste",q:"Which direction does the crocodile face?",opts:["Left","Right"],correct:1},
  {brand:"Mastercard",q:"Which colour is on the LEFT?",opts:["Red on left","Yellow on left"],correct:0},
  {brand:"BMW",q:"Upper-left quadrant colour?",opts:["Blue","White"],correct:0},
  {brand:"Nike",q:"Which direction does the swoosh point?",opts:["Left","Right"],correct:1},
];

let myName='',myPid='',myScore=0,currentQ=-1,answered=false,timerInterval=null;

/* ── HELPER: always write name+score together ── */
function addMyScore(delta){
  db.ref('players/'+myPid).transaction(function(p){
    if(!p) return {name:myName, score:delta};
    return {name:myName, score:(p.score||0)+delta};
  });
}

/* ── CELEBRATION EFFECTS ── */
function celebrate(){
  /* screen flash */
  const flash=document.getElementById('flash-overlay');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  /* score pill burst */
  const pill=document.getElementById('game-score');
  pill.style.animation='none';
  void pill.offsetWidth;
  pill.style.animation='scoreBurst .5s ease';

  /* sparkle particles */
  const rect=pill.getBoundingClientRect();
  const colors=['#F59E0B','#FCD34D','#22C55E','#3B82F6','#fff','#EF4444'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='sparkle-player';
    const sz=Math.random()*6+3;
    s.style.width=sz+'px';s.style.height=sz+'px';
    s.style.background=colors[Math.floor(Math.random()*colors.length)];
    s.style.left=(rect.left+rect.width/2)+'px';
    s.style.top=(rect.top)+'px';
    s.style.setProperty('--sx',(Math.random()*100-50)+'px');
    s.style.setProperty('--sy',(Math.random()*-80-20)+'px');
    s.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),700);
  }
}

/* ── CANVAS (floating words) ── */
(function(){
  const c=document.getElementById('join-canvas'),ctx=c.getContext('2d');
  const words=['VW','STARBUCKS','HERMÈS','AMAZON','NIKE','IKEA','PEPSI','BMW','LACOSTE','MONOPOLY','BOOKING','TWITTER','PRINGLES','MASTERCARD',"McDONALD'S"];
  const items=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<20;i++) items.push({word:words[i%words.length],x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,size:Math.random()*16+8,alpha:Math.random()*.2+.04,rot:(Math.random()-.5)*.25});
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    items.forEach(it=>{it.x+=it.vx;it.y+=it.vy;if(it.x<-180)it.x=c.width+40;if(it.x>c.width+180)it.x=-40;if(it.y<-30)it.y=c.height+15;if(it.y>c.height+30)it.y=-15;
      ctx.save();ctx.translate(it.x,it.y);ctx.rotate(it.rot);ctx.globalAlpha=it.alpha;ctx.fillStyle='#fff';ctx.font=`700 ${it.size}px 'Space Grotesk',Arial`;ctx.fillText(it.word,0,0);ctx.restore();});
    requestAnimationFrame(draw);
  })();
})();

/* ── PLAYER LIST ON JOIN ── */
db.ref('players').on('value',snap=>{
  const p=snap.val()||{};
  const names=Object.entries(p).map(([k,v])=>v.name||k).filter(n=>n&&n!=='undefined');
  const el=document.getElementById('join-list');
  el.innerHTML=names.length?'<b>'+names.length+' joined:</b> '+names.join(', '):'Waiting for players...';
});

document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});

function joinGame(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('join-error').textContent='Please enter your name';return;}
  myName=name;myPid=name.replace(/[\s.#$/\[\]]/g,'_');
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  /* ALWAYS write name+score together */
  db.ref('players/'+myPid).set({name:myName,score:0}).then(()=>{
    document.getElementById('join').style.display='none';
    document.getElementById('join-canvas').style.display='none';
    document.getElementById('waiting').style.display='flex';
    document.getElementById('wait-name').textContent=myName;
    document.getElementById('wait-avatar').textContent=initials;
    listen();
  }).catch(e=>{document.getElementById('join-error').textContent='Error: '+e.message;});
}

function listen(){
  db.ref('game/currentQ').on('value',snap=>{
    const q=snap.val();if(q===null||q===undefined)return;
    if(q===-2){showResult();return;}
    if(q!==currentQ){currentQ=q;answered=false;clearInterval(timerInterval);if(currentQ>=0&&currentQ<QS.length)showQuestion(currentQ);}
  });
  db.ref('game/revealed').on('value',snap=>{
    if(snap.val()===true){lockAndShow();checkBonus();}
  });
  /* listen to whole player object, not just score */
  db.ref('players/'+myPid).on('value',snap=>{
    const p=snap.val();if(!p)return;
    const s=p.score||0;
    if(s!==myScore && s>myScore) celebrate();
    myScore=s;
    document.getElementById('wait-score').textContent=s;
    document.getElementById('game-score').textContent=s+' pts';
  });
  db.ref('players').on('value',snap=>{renderMiniLB(snap.val()||{});});
}

function showQuestion(idx){
  document.getElementById('waiting').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('result').style.display='none';
  /* re-register name in case host did a reset */
  db.ref('players/'+myPid).update({name:myName});
  const q=QS[idx];
  document.getElementById('game-badge').textContent='LOGO '+(idx+1)+'/15';
  document.getElementById('game-brand').textContent=q.brand;
  document.getElementById('game-question').textContent=q.q;
  document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';
  db.ref('game/logoB64').once('value',snap=>{const b=snap.val();const img=document.getElementById('game-logo');if(b){img.src=b;img.style.display='block';}else img.style.display='none';});
  const od=document.getElementById('options');od.innerHTML='';
  q.opts.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i,idx);od.appendChild(btn);});
  const bar=document.getElementById('timer-bar');bar.style.width='100%';bar.className='timer-bar';
  let el=0;clearInterval(timerInterval);
  timerInterval=setInterval(()=>{el+=.3;const pct=Math.max(0,100-(el/30*100));bar.style.width=pct+'%';if(pct<20)bar.className='timer-bar low';
    if(el>=30){clearInterval(timerInterval);if(!answered){lockAndShow();document.getElementById('feedback').textContent='⏰ Time\'s up!';document.getElementById('feedback').className='feedback timeout';}}},300);
}

function selectAnswer(oi,qi){
  if(answered)return;answered=true;clearInterval(timerInterval);
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{if(i===oi)b.classList.add('selected');b.disabled=true;});
  const ok=oi===QS[qi].correct;
  db.ref('answers/'+currentQ+'/'+myPid).set({name:myName,answer:oi,correct:ok,time:Date.now()});
  if(ok){
    document.getElementById('feedback').textContent='✅ Correct! +1';
    document.getElementById('feedback').className='feedback correct';
    addMyScore(1);
  } else {
    document.getElementById('feedback').textContent='❌ Wrong!';
    document.getElementById('feedback').className='feedback wrong';
  }
  showCorrectBtns();
}

function showCorrectBtns(){const q=QS[currentQ];if(!q)return;document.querySelectorAll('.opt-btn').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('correct');else if(b.classList.contains('selected'))b.classList.add('wrong');});}
function lockAndShow(){answered=true;clearInterval(timerInterval);document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);showCorrectBtns();}

function checkBonus(){
  db.ref('answers/'+currentQ).once('value',snap=>{
    const ans=snap.val()||{};
    const correct=Object.entries(ans).filter(([_,a])=>a.correct).sort((a,b)=>a[1].time-b[1].time);
    if(!correct.length)return;
    const mine=ans[myPid];if(!mine||!mine.correct)return;
    const diff=mine.time-correct[0][1].time;
    if(diff<=500){
      addMyScore(1);
      document.getElementById('feedback').textContent='🚀 Fastest! +2';
      document.getElementById('feedback').className='feedback bonus';
    }
  });
}

function renderMiniLB(players){
  const sorted=Object.entries(players).map(([k,p])=>({name:p.name||k,score:p.score||0})).filter(p=>p.name&&p.name!=='undefined').sort((a,b)=>b.score-a.score);
  document.getElementById('mlb-count').textContent=sorted.length+' players';
  const list=document.getElementById('mlb-list');list.innerHTML='';
  const myRank=sorted.findIndex(p=>p.name===myName)+1;
  sorted.slice(0,5).forEach((p,i)=>{
    const row=document.createElement('div');const isMe=p.name===myName;
    row.className='mlb-row'+(isMe?' me':'')+(i===0&&p.score>0?' top1':'');
    row.innerHTML=`<div class="mlb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</div><div class="mlb-name">${isMe?'<b>'+p.name+'</b>':p.name}</div><div class="mlb-pts">${p.score}</div>`;
    list.appendChild(row);
  });
  if(myRank>5){
    const sep=document.createElement('div');sep.className='mlb-sep';sep.textContent='···';list.appendChild(sep);
    const row=document.createElement('div');row.className='mlb-row me';
    row.innerHTML=`<div class="mlb-rank">${myRank}</div><div class="mlb-name"><b>${myName}</b></div><div class="mlb-pts">${myScore}</div>`;
    list.appendChild(row);
  }
}

function showResult(){
  document.getElementById('game').style.display='none';document.getElementById('waiting').style.display='none';
  document.getElementById('result').style.display='flex';document.getElementById('result-score').textContent=myScore;
  clearInterval(timerInterval);
  db.ref('players').once('value',snap=>{
    const pl=Object.values(snap.val()||{}).filter(p=>p.name).sort((a,b)=>(b.score||0)-(a.score||0));
    const rank=pl.findIndex(p=>p.name===myName)+1;const el=document.getElementById('result-rank');
    if(rank===1)el.textContent='🥇 1st Place!';else if(rank===2)el.textContent='🥈 2nd Place!';else if(rank===3)el.textContent='🥉 3rd Place!';else el.textContent='#'+rank+' of '+pl.length;
  });
}
</script>
</body>
</html>
